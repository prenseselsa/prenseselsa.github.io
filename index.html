<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lale Mektubu </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Grotesk:wght@300;400;500&display=swap');

        :root {
            --bg-color: #050505;
            --neon-white: #ffffff;
            --neon-cyan: #22d3ee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #020204;
            color: var(--neon-white);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* UYGULAMA İKONU ANA EKRANI */
        #launcher {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #launcher:hover {
            transform: scale(1.08);
        }

        .app-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(8, 51, 68, 0.8), rgba(5, 5, 5, 0.9));
            border: 1.5px solid rgba(34, 211, 238, 0.6);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.25);
            backdrop-filter: blur(10px);
            margin-bottom: 12px;
        }

        .app-icon svg {
            width: 50px;
            height: 50px;
            stroke: var(--neon-cyan);
            fill: none;
            stroke-width: 2;
            filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.8));
        }

        .app-label {
            font-size: 0.95rem;
            letter-spacing: 1px;
            color: #e2e8f0;
            font-weight: 400;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* UYGULAMA EKRANI (ORİJİNAL KODUN OLDUĞU YER) */
        #appScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 10;
        }

        #appScreen.active {
            opacity: 1;
            pointer-events: all;
        }

        /* SOL ÜST GERİ DÖNÜŞ BUTONU */
        .back-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 60;
            background: rgba(8, 51, 68, 0.4);
            border: 1px solid rgba(34, 211, 238, 0.4);
            color: var(--neon-cyan);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(8, 51, 68, 0.8);
            border-color: rgba(34, 211, 238, 0.8);
            box-shadow: 0 0 25px rgba(34, 211, 238, 0.5);
            transform: scale(1.1);
        }

        .back-btn svg {
            width: 22px;
            height: 22px;
            stroke: var(--neon-cyan);
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Orijinal CSS Kodların */
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: float-up infinite linear;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        .svg-container {
            position: relative;
            width: 100%;
            max-width: 350px;
            aspect-ratio: 3/4;
            z-index: 10;
            margin-bottom: 2rem;
        }

        .svg-container svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            overflow: visible;
        }

        .tulip-path {
            fill: none;
            stroke: var(--neon-white);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.7));
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        #appScreen.active .tulip-path {
            animation: draw 2s ease-in-out forwards;
        }

        .steth-path {
            fill: none;
            stroke: var(--neon-cyan);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.8));
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            opacity: 0;
        }

        .steth-circle {
            fill: none;
            stroke: var(--neon-cyan);
            stroke-width: 3;
            filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.8));
            stroke-dasharray: 150;
            stroke-dashoffset: 150;
            opacity: 0;
        }

        .steth-dot {
            fill: var(--neon-cyan);
            filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.8));
            opacity: 0;
        }

        .show-steth .steth-path {
            animation: draw 2s ease-in-out forwards, fade-in 0.1s forwards;
        }
        .show-steth .steth-circle {
            animation: draw-circle 1.5s ease-in-out forwards, fade-in 0.1s forwards;
        }
        .show-steth .steth-dot {
            animation: fade-in 1s ease-in-out forwards;
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes draw-circle { to { stroke-dashoffset: 0; } }
        @keyframes fade-in { to { opacity: 1; } }

        .content {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.5s ease-out, transform 1.5s ease-out;
        }

        .content.show {
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            letter-spacing: 0.1em;
            text-align: center;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
            font-weight: 300;
        }

        button.main-btn {
            background: rgba(8, 51, 68, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(34, 211, 238, 0.5);
            color: #cffafe;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.15);
            transition: all 0.5s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        button.main-btn:hover {
            background: rgba(8, 51, 68, 0.5);
            border-color: rgba(34, 211, 238, 0.8);
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.4);
            transform: scale(1.05);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            padding: 1.5rem;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: rgba(3, 3, 3, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 50px rgba(34, 211, 238, 0.2);
            transform: scale(0.95) translateY(30px);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-overlay.show .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: #f3f4f6;
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 0.05em;
            font-style: italic;
            margin-bottom: 3rem;
        }

        .close-btn {
            background: transparent;
            border: 1px solid rgba(34, 211, 238, 0.3);
            color: rgba(34, 211, 238, 0.8);
            padding: 0.8rem 2rem;
            box-shadow: none;
            border-radius: 50px;
            cursor: pointer;
        }

        .close-btn:hover {
            color: rgba(34, 211, 238, 1);
            border-color: rgba(34, 211, 238, 0.8);
        }
    </style>
</head>
<body>

    <!-- Müzik -->
    <audio id="bgMusic" loop src="olurya.mp3"></audio>

    <!-- UYGULAMA İKONU (AÇILIŞ EKRANI) -->
    <div id="launcher" onclick="openApp()">
        <div class="app-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </div>
        <div class="app-label">Lale Mektubu</div>
    </div>

    <!-- UYGULAMA EKRANI -->
    <div id="appScreen">
        <!-- SOL ÜST GERİ DÖNÜŞ BUTONU -->
        <button class="back-btn" onclick="closeApp()" title="Ana Ekrana Dön">
            <svg viewBox="0 0 24 24">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>

        <div id="particles"></div>

        <div class="svg-container" id="svgContainer">
            <!-- Tulip -->
            <svg viewBox="0 0 300 400" id="tulipSvg">
                <path class="tulip-path" style="animation-delay: 0s;" d="M150 350 C 145 280, 160 220, 150 160" />
                <path class="tulip-path" style="animation-delay: 0.6s; stroke-width: 1.5;" d="M150 300 C 100 260, 60 200, 75 140 C 95 180, 125 220, 150 240" />
                <path class="tulip-path" style="animation-delay: 0.9s; stroke-width: 1.5;" d="M150 270 C 190 230, 230 180, 215 120 C 195 160, 165 200, 150 215" />
                <path class="tulip-path" style="animation-delay: 1.5s; stroke-width: 2;" d="M150 160 C 110 150, 100 100, 120 60 C 135 90, 145 120, 150 135" />
                <path class="tulip-path" style="animation-delay: 1.7s; stroke-width: 2;" d="M150 160 C 190 150, 200 100, 180 60 C 165 90, 155 120, 150 135" />
                <path class="tulip-path" style="animation-delay: 1.9s; stroke-width: 2;" d="M130 95 C 140 60, 150 30, 150 30 C 150 30, 160 60, 170 95 C 155 120, 145 120, 130 95 Z" />
            </svg>

            <!-- Stethoscope -->
            <svg viewBox="0 0 300 400" id="stethSvg">
                <path class="steth-path" style="animation-delay: 0s;" d="M130 320 C 190 350, 210 280, 175 230 C 140 180, 100 250, 120 300" />
                <path class="steth-path" style="animation-delay: 0.6s;" d="M120 300 C 140 350, 240 330, 220 220 C 210 160, 180 150, 180 110" />
                <path class="steth-path" style="animation-delay: 1.2s;" d="M180 110 C 170 80, 155 60, 165 50" />
                <path class="steth-path" style="animation-delay: 1.3s;" d="M180 110 C 190 80, 205 60, 195 50" />
                <circle class="steth-circle" style="animation-delay: 1.8s;" cx="130" cy="320" r="16" />
                <circle class="steth-dot" style="animation-delay: 2.1s;" cx="130" cy="320" r="5" />
            </svg>
        </div>

        <div class="content" id="contentBox">
            <h1>Tayfun'dan Damla İçin...</h1>
            <button class="main-btn" id="openBtn">
                Notu Okumak İster misin?
            </button>
        </div>

        <div class="modal-overlay" id="modal">
            <div class="modal-content">
                <p class="modal-text">
                    "Gelecekte binlerce kalbe şifa olacaksın biliyorum, ama şimdiden ritmini değiştirdiğin tek bir kalp var... Tıp fakültesi yolunda da, hayatın her anında da her zaman seninle, senin yanındayım. İyi ki varsın geleceğin en güzel doktoru."
                </p>
                <button class="close-btn" id="closeBtn">Kapat</button>
            </div>
        </div>
    </div>

    <script>
        let timer1, timer2;

        // Uygulamayı Açma
        function openApp() {
            document.getElementById('launcher').style.display = 'none';
            const appScreen = document.getElementById('appScreen');
            appScreen.classList.add('active');

            // Parçacıkları Oluştur
            createParticles();

            // Animasyon Zamanlamaları
            timer1 = setTimeout(() => {
                document.getElementById('svgContainer').classList.add('show-steth');
            }, 3500);

            timer2 = setTimeout(() => {
                document.getElementById('contentBox').classList.add('show');
            }, 6000);
        }

        // Ana Ekrana Geri Dönme (Çıkış)
        function closeApp() {
            const appScreen = document.getElementById('appScreen');
            const bgMusic = document.getElementById('bgMusic');
            const modal = document.getElementById('modal');

            // Müziği Durdur
            bgMusic.pause();
            bgMusic.currentTime = 0;

            // Modalı Kapat
            modal.classList.remove('show');

            // Zamanlayıcıları Temizle
            clearTimeout(timer1);
            clearTimeout(timer2);

            // Ekran Öğelerini Sıfırla
            document.getElementById('svgContainer').classList.remove('show-steth');
            document.getElementById('contentBox').classList.remove('show');
            document.getElementById('particles').innerHTML = '';

            // Ekranı Kapat ve İkonu Göster
            appScreen.classList.remove('active');
            setTimeout(() => {
                document.getElementById('launcher').style.display = 'flex';
            }, 300);
        }

        // Particle Üretici
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            particlesContainer.innerHTML = '';
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 2 + 1;
                const x = Math.random() * 100;
                const delay = Math.random() * -20;
                const duration = Math.random() * 20 + 15;
                const isCyan = Math.random() > 0.7;

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${x}%`;
                particle.style.animationDelay = `${delay}s`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.backgroundColor = isCyan ? 'var(--neon-cyan)' : 'var(--neon-white)';
                particle.style.boxShadow = `0 0 ${size * 2}px ${isCyan ? 'var(--neon-cyan)' : 'var(--neon-white)'}`;

                particlesContainer.appendChild(particle);
            }
        }

        // Modal ve Müzik Logic
        const modal = document.getElementById('modal');
        const openBtn = document.getElementById('openBtn');
        const closeBtn = document.getElementById('closeBtn');
        const bgMusic = document.getElementById('bgMusic');

        openBtn.addEventListener('click', () => {
            modal.classList.add('show');
            if (bgMusic.paused) {
                bgMusic.play().catch(e => console.log("Audio play failed:", e));
            }
        });

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('show');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('show');
            }
        });
    </script>
</body>
</html>
