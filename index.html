<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bir İhtimal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            color: #e4e4e7;
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            overflow: hidden;
        }

        .container {
            max-width: 800px;
            width: 90%;
            text-align: center;
            position: relative;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .story-text {
            font-size: 1.5rem;
            line-height: 1.8;
            color: #d4d4d8;
            letter-spacing: 0.05em;
            transition: opacity 1.8s ease-in-out, transform 1.8s ease-in-out, filter 1.8s ease-in-out;
            opacity: 0;
            transform: translateY(15px);
            filter: blur(8px);
            position: absolute;
            width: 100%;
        }

        @media (min-width: 768px) {
            .story-text {
                font-size: 2.25rem;
            }
        }

        .story-text.active {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0px);
        }

        .story-text.exit {
            opacity: 0;
            transform: translateY(-15px);
            filter: blur(8px);
        }

        .hint {
            position: absolute;
            bottom: 40px;
            font-size: 0.75rem;
            color: #71717a;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-family: sans-serif;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .hint.visible {
            opacity: 0.4;
        }

        .end-text {
            font-size: 1.25rem;
            color: #52525b;
            font-style: italic;
            letter-spacing: 0.1em;
            opacity: 0;
            transition: opacity 2.5s ease;
            position: absolute;
        }

        .end-text.active {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="text-container" class="story-text"></div>
        <div id="end-container" class="end-text">Son.</div>
    </div>

    <div id="hint" class="hint visible">Devam etmek için ekrana dokun</div>

    <script>
        const storyLines = [
            "Bazen durup düşünüyorum...",
            "Eğer o gün farklı bir son yazsaydık, şimdi nerede olurduk?",
            "Belki şu an, hep gitmek istediğimiz o yerde olurduk.",
            "Sen yine heyecanla bir şeyler anlatıyor olurdun...",
            "Ben de başka bir yere bakıyormuş gibi yapıp, gizlice seni izlerdim.",
            "Zor günlerimiz olmaz mıydı? Elbette olurdu.",
            "Ama birbirimize sırtımızı dönmek yerine, ellerimizi daha sıkı tutardık.",
            "Keşke yarım kalmasaydık...",
            "Sadece bilmeni istedim;",
            "Benim aklımdaki 'biz' çok güzeldi.",
            "Kendine çok iyi bak."
        ];

        let currentIndex = 0;
        let isAnimating = false;
        
        const textContainer = document.getElementById('text-container');
        const endContainer = document.getElementById('end-container');
        const hint = document.getElementById('hint');

        function showNextLine() {
            if (isAnimating) return;
            
            if (currentIndex > storyLines.length) {
                return;
            }

            isAnimating = true;

            if (textContainer.classList.contains('active')) {
                textContainer.classList.remove('active');
                textContainer.classList.add('exit');
                
                // Metnin kaybolmasını bekleyip yenisini getir
                setTimeout(() => {
                    updateTextAndShow();
                }, 1800);
            } else {
                updateTextAndShow();
            }
        }

        function updateTextAndShow() {
            if (currentIndex >= storyLines.length) {
                textContainer.style.display = 'none';
                endContainer.classList.add('active');
                hint.classList.remove('visible');
                isAnimating = false;
                currentIndex++;
                return;
            }

            textContainer.className = 'story-text';
            void textContainer.offsetWidth; // Reflow tetikle
            
            textContainer.innerText = storyLines[currentIndex];
            textContainer.classList.add('active');

            if (currentIndex > 0) {
                hint.classList.remove('visible');
            }

            currentIndex++;
            
            setTimeout(() => {
                isAnimating = false;
            }, 1800);
        }

        // İlk cümlenin gecikmeli gelmesi için
        setTimeout(() => {
            showNextLine();
        }, 500);

        document.body.addEventListener('click', showNextLine);
    </script>
</body>
</html>
